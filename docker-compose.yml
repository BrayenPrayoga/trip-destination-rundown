services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trip-destination-rundown-app
    restart: unless-stopped
    ports:
      - "67:8000"
    environment:
      APP_NAME: "Trip Destination Rundown"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://10.10.1.242:67
      LOG_CHANNEL: stack
      LOG_LEVEL: info
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      - app_storage:/var/www/html/storage
      - app_database:/var/www/html/database

volumes:
  app_storage:
  app_database:
