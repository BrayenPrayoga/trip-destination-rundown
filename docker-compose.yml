services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trip-destination-rundown-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "67:8000"
    environment:
      APP_NAME: "Trip Destination Rundown"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://10.10.1.242:67
      LOG_CHANNEL: stack
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: travel_jogja
      DB_USERNAME: postgres
      DB_PASSWORD: "Admin1234%"
    volumes:
      - app_storage:/var/www/html/storage
  db:
    image: postgres:16-alpine
    container_name: trip-destination-rundown-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: travel_jogja
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Admin1234%"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_jogja"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  app_storage:
  pg_data:
