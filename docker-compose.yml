services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trip-destination-rundown-app
    restart: unless-stopped
    ports:
      - "67:8000"
    env_file:
      - .env
    volumes:
      - app_storage:/var/www/html/storage
      - ./.env:/var/www/html/.env

volumes:
  app_storage:
